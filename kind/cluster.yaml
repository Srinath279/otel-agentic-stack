kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: otel-demo
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30030      # Grafana  -> http://localhost:30030
        hostPort: 30030
      - containerPort: 30080      # Agent    -> http://localhost:30080
        hostPort: 30080
