apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: otel-demo
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        url: http://prometheus:9090
        access: proxy
        isDefault: true
      - name: Tempo
        uid: tempo
        type: tempo
        url: http://tempo:3200
        access: proxy
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
      - name: Loki
        uid: loki
        type: loki
        url: http://loki:3100
        access: proxy
        jsonData:
          derivedFields:                 # M7: link a log's trace_id straight to the Tempo trace
            - name: TraceID
              matcherType: label
              matcherRegex: trace_id
              datasourceUid: tempo
              url: '$${__value.raw}'
      - name: Alertmanager
        uid: alertmanager
        type: alertmanager
        url: http://alertmanager:9093
        access: proxy
        jsonData:
          implementation: prometheus
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: otel-demo
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: default
        folder: ''
        type: file
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: otel-demo
spec:
  replicas: 1
  selector:
    matchLabels: {app: grafana}
  template:
    metadata:
      labels: {app: grafana}
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.2.0
          ports:
            - {containerPort: 3000}
          env:
            - {name: GF_AUTH_ANONYMOUS_ENABLED, value: "true"}
            - {name: GF_AUTH_ANONYMOUS_ORG_ROLE, value: "Admin"}
            - {name: GF_AUTH_DISABLE_LOGIN_FORM, value: "true"}
          volumeMounts:
            - {name: datasources, mountPath: /etc/grafana/provisioning/datasources}
            - {name: dashboards-provider, mountPath: /etc/grafana/provisioning/dashboards}
            - {name: dashboards, mountPath: /var/lib/grafana/dashboards}
          resources:
            requests: {cpu: "100m", memory: "128Mi"}
            limits: {memory: "256Mi"}
      volumes:
        - {name: datasources, configMap: {name: grafana-datasources}}
        - {name: dashboards-provider, configMap: {name: grafana-dashboards-provider}}
        - name: dashboards
          configMap:
            name: grafana-dashboard       # created by the Makefile from dashboards/agent-overview.json
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: otel-demo
spec:
  type: NodePort
  selector: {app: grafana}
  ports:
    - {port: 3000, targetPort: 3000, nodePort: 30030}
