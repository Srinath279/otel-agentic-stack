apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: otel-demo
data:
  alertmanager.yml: |
    route:
      receiver: default
      group_by: ['alertname']
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 1h
    receivers:
      # Local demo: a no-op receiver. In prod, add slack_configs / webhook_configs / pagerduty_configs.
      - name: default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: otel-demo
spec:
  replicas: 1
  selector:
    matchLabels: {app: alertmanager}
  template:
    metadata:
      labels: {app: alertmanager}
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.27.0
          args:
            - "--config.file=/etc/alertmanager/alertmanager.yml"
            - "--storage.path=/alertmanager"
          ports:
            - {containerPort: 9093}
          volumeMounts:
            - {name: config, mountPath: /etc/alertmanager}
          resources:
            requests: {cpu: "50m", memory: "64Mi"}
            limits: {memory: "128Mi"}
      volumes:
        - {name: config, configMap: {name: alertmanager-config}}
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: otel-demo
spec:
  selector: {app: alertmanager}
  ports:
    - {port: 9093, targetPort: 9093}
