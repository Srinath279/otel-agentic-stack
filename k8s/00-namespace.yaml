apiVersion: v1
kind: Namespace
metadata:
  name: otel-demo
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-config
  namespace: otel-demo
data:
  LLM_MODE: "mock"                       # set to "claude" to use the Anthropic API
  CLAUDE_MODEL: "claude-opus-4-8"
  OTEL_SERVICE_NAME: "agentic-demo"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector-gateway:4317"
  OTEL_EXPORTER_OTLP_INSECURE: "true"
  OTEL_RESOURCE_ATTRIBUTES: "deployment.environment=local,service.namespace=agents"
