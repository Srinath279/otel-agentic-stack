apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: otel-demo
data:
  loki.yaml: |
    auth_enabled: false
    server:
      http_listen_port: 3100
    common:
      instance_addr: 127.0.0.1
      path_prefix: /loki
      storage:
        s3:                        # H1: chunks + index in object storage (MinIO)
          endpoint: http://minio:9000
          bucketnames: loki
          access_key_id: minioadmin
          secret_access_key: minioadmin
          s3forcepathstyle: true
          insecure: true
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory
    schema_config:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: index_
            period: 24h
    limits_config:
      allow_structured_metadata: true
      volume_enabled: true
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: loki-data
  namespace: otel-demo
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: otel-demo
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: {app: loki}
  template:
    metadata:
      labels: {app: loki}
    spec:
      securityContext:
        fsGroup: 10001          # loki runs non-root; let it write the PVC
      containers:
        - name: loki
          image: grafana/loki:3.2.1
          args: ["-config.file=/etc/loki/loki.yaml"]
          ports:
            - {containerPort: 3100}
          volumeMounts:
            - {name: config, mountPath: /etc/loki}
            - {name: data, mountPath: /loki}
          resources:
            requests: {cpu: "100m", memory: "256Mi"}
            limits: {memory: "512Mi"}
      volumes:
        - {name: config, configMap: {name: loki-config}}
        - {name: data, persistentVolumeClaim: {claimName: loki-data}}
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: otel-demo
spec:
  selector: {app: loki}
  ports:
    - {port: 3100, targetPort: 3100}
