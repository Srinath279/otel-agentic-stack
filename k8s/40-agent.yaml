apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent
  namespace: otel-demo
spec:
  replicas: 1
  selector:
    matchLabels: {app: agent}
  template:
    metadata:
      labels: {app: agent}
    spec:
      containers:
        - name: agent
          image: agentic-demo:dev
          imagePullPolicy: Never           # use the kind-loaded image only; never pull from a registry
          ports:
            - {containerPort: 8080}
          envFrom:
            - configMapRef: {name: agent-config}
            - secretRef:
                name: anthropic
                optional: true              # only needed when LLM_MODE=claude
          readinessProbe:
            httpGet: {path: /healthz, port: 8080}
            initialDelaySeconds: 5
          resources:
            requests: {cpu: "100m", memory: "256Mi"}
            limits: {memory: "512Mi"}
---
apiVersion: v1
kind: Service
metadata:
  name: agent
  namespace: otel-demo
spec:
  type: NodePort
  selector: {app: agent}
  ports:
    - {port: 8080, targetPort: 8080, nodePort: 30080}
