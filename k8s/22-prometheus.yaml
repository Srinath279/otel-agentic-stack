apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: otel-demo
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      # Agent + spanmetrics RED metrics, re-exposed by the consumer collector.
      - job_name: otel-consumer-metrics
        static_configs:
          - targets: ['otel-collector-consumer:8889']
      # Collectors' own self-observability (dropped spans, queue depth, refused data).
      - job_name: collector-telemetry
        static_configs:
          - targets: ['otel-collector-gateway:8888', 'otel-collector-consumer:8888']
      - job_name: prometheus
        static_configs:
          - targets: ['localhost:9090']
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: otel-demo
spec:
  replicas: 1
  selector:
    matchLabels: {app: prometheus}
  template:
    metadata:
      labels: {app: prometheus}
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--enable-feature=exemplar-storage"
          ports:
            - {containerPort: 9090}
          volumeMounts:
            - {name: config, mountPath: /etc/prometheus}
          resources:
            requests: {cpu: "100m", memory: "256Mi"}
            limits: {memory: "512Mi"}
      volumes:
        - {name: config, configMap: {name: prometheus-config}}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: otel-demo
spec:
  selector: {app: prometheus}
  ports:
    - {port: 9090, targetPort: 9090}
