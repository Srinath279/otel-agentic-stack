apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: otel-demo
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200
    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
    ingester:
      max_block_duration: 5m
    compactor:
      compaction:
        block_retention: 1h
    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/blocks
        wal:
          path: /var/tempo/wal
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo
  namespace: otel-demo
spec:
  replicas: 1
  selector:
    matchLabels: {app: tempo}
  template:
    metadata:
      labels: {app: tempo}
    spec:
      containers:
        - name: tempo
          image: grafana/tempo:2.6.1
          args: ["-config.file=/etc/tempo/tempo.yaml"]
          ports:
            - {containerPort: 3200}   # query API
            - {containerPort: 4317}   # OTLP gRPC in
          volumeMounts:
            - {name: config, mountPath: /etc/tempo}
            - {name: data, mountPath: /var/tempo}
          resources:
            requests: {cpu: "100m", memory: "256Mi"}
            limits: {memory: "512Mi"}
      volumes:
        - {name: config, configMap: {name: tempo-config}}
        - {name: data, emptyDir: {}}
---
apiVersion: v1
kind: Service
metadata:
  name: tempo
  namespace: otel-demo
spec:
  selector: {app: tempo}
  ports:
    - {name: http, port: 3200, targetPort: 3200}
    - {name: otlp, port: 4317, targetPort: 4317}
