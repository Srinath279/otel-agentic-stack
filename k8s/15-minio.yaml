# H1: object storage (S3-compatible) for Tempo + Loki — the production HA-backend
# pattern. MinIO stands in for S3/GCS; on a real cluster point at managed object storage.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data
  namespace: otel-demo
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: otel-demo
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: {app: minio}
  template:
    metadata:
      labels: {app: minio}
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - {name: MINIO_ROOT_USER, value: "minioadmin"}
            - {name: MINIO_ROOT_PASSWORD, value: "minioadmin"}
          ports:
            - {containerPort: 9000}
            - {containerPort: 9001}
          volumeMounts:
            - {name: data, mountPath: /data}
          resources:
            requests: {cpu: "100m", memory: "256Mi"}
            limits: {memory: "512Mi"}
      volumes:
        - {name: data, persistentVolumeClaim: {claimName: minio-data}}
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: otel-demo
spec:
  selector: {app: minio}
  ports:
    - {name: api, port: 9000, targetPort: 9000}
    - {name: console, port: 9001, targetPort: 9001}
---
# Create the tempo + loki buckets once MinIO is reachable.
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-mkbuckets
  namespace: otel-demo
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              until mc alias set local http://minio:9000 minioadmin minioadmin; do
                echo "waiting for minio..."; sleep 2;
              done
              mc mb -p local/tempo || true
              mc mb -p local/loki  || true
              echo "buckets ready"
